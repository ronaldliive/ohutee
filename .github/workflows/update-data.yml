name: Uuenda liiklusõnnetuste andmeid

on:
  workflow_dispatch:
  schedule:
    - cron: "17 3 * * *"

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Paigalda sõltuvused
        run: pip install requests beautifulsoup4 pyproj
      - name: Laadi ja töötle ametlikud andmed
        run: python scripts/update_data.py
      - name: Salvesta muutunud andmed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/accidents.json data/status.json
          git diff --cached --quiet || git commit -m "Uuenda liiklusõnnetuste andmeid"
          git push
